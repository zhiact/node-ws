<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的博客</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial;
            margin: 0;
            background: #f5f7fa;
            color: #333;
        }
        header {
            background: #111;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 800px;
            margin: 30px auto;
            padding: 0 15px;
        }
        .post {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }
        .post:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .post h2 {
            margin: 0;
        }
        .date {
            color: #888;
            font-size: 14px;
        }
        .content {
            display: none;
            margin-top: 15px;
            line-height: 1.6;
        }
        footer {
            text-align: center;
            padding: 20px;
            color: #aaa;
        }
    </style>
</head>
<body>

<header>
    <h1>我的博客</h1>
    <p>记录学习与生活</p>
</header>

<div class="container">

    <div class="post" onclick="toggle(this)">
        <h2>第一篇文章</h2>
        <div class="date">2026-04-16</div>
        <div class="content">
            <p>这是我的第一篇博客内容 🚀</p>
            <p>你可以在这里写任何内容，比如技术、生活、随笔等。</p>
        </div>
    </div>

    <div class="post" onclick="toggle(this)">
        <h2>关于这个博客</h2>
        <div class="date">2026-04-15</div>
        <div class="content">
            <p>这是一个纯 HTML 静态博客。</p>
            <p>无需数据库、无需后端，部署超级简单。</p>
        </div>
    </div>

</div>

<footer>
    © 2026 我的博客
</footer>

<script>
function toggle(el) {
    const content = el.querySelector(".content");
    content.style.display = content.style.display === "block" ? "none" : "block";
}
</script>

</body>
</html>
